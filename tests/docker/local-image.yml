schemaVersion: 2.0.0

commandTests:
  - name: OS version check
    command: cat
    args: [/etc/os-release]
    expectedOutput: [VERSION_ID=3\.23]

  - name: Required tools installed
    command: bash
    args:
      - -lc
      - command -v bash >/dev/null 2>&1 && command -v terraform >/dev/null 2>&1 && command -v format-hcl >/dev/null 2>&1 && command -v fmt.sh >/dev/null 2>&1 && command -v terragrunt-fmt.sh >/dev/null 2>&1

  - name: Entrypoint handles empty dir input
    command: bash
    args:
      - -lc
      - INPUT_LIST=false INPUT_WRITE=true INPUT_IGNORE='' INPUT_DIFF=false INPUT_CHECK=false INPUT_RECURSIVE=true INPUT_DIR='' /entrypoint.sh >/tmp/entrypoint.log 2>&1 || (cat /tmp/entrypoint.log && exit 1)

  - name: Check mode disables write automatically
    command: bash
    args:
      - -lc
      - |
        mkdir -p /tmp/check-write-conflict
        printf 'locals{a=1}\n' > /tmp/check-write-conflict/main.tf
        INPUT_LIST=false INPUT_WRITE=true INPUT_IGNORE='' \
          INPUT_DIFF=false INPUT_CHECK=true INPUT_RECURSIVE=true \
          INPUT_DIR='/tmp/check-write-conflict' /entrypoint.sh \
          >/tmp/check-write.log 2>&1 || (cat /tmp/check-write.log && exit 1)
        grep -q 'check=true requires write=false; overriding write to false' /tmp/check-write.log

  - name: Temporary and APK cache cleaned
    command: bash
    args:
      - -lc
      - >-
        test ! -f /tmp/alpine-packages.txt &&
        (test ! -d /var/cache/apk || test -z "$(find /var/cache/apk -mindepth 1 -maxdepth 1 2>/dev/null)") &&
        (test ! -d /root/.cache || test -z "$(find /root/.cache -mindepth 1 -maxdepth 1 2>/dev/null)")

fileExistenceTests:
  - name: entrypoint exists
    path: /entrypoint.sh
    shouldExist: true
    permissions: -rwxr-xr-x

metadataTest:
  workdir: /github/workspace
  entrypoint: [/entrypoint.sh]
